<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450">
  <rect width="600" height="450" fill="#8a7040"/>
  <!-- brass texture -->
  <rect x="0" y="0" width="600" height="225" fill="#B08968" opacity="0.8"/>
  <rect x="0" y="225" width="600" height="225" fill="#9a7850" opacity="0.8"/>
  <!-- reflection line -->
  <line x1="0" y1="220" x2="600" y2="230" stroke="#d4b080" stroke-width="3" opacity="0.5"/>
  <!-- surface details -->
  <circle cx="200" cy="180" r="40" fill="#c8a060" opacity="0.2"/>
  <circle cx="400" cy="270" r="50" fill="#c8a060" opacity="0.15"/>
  <text x="300" y="235" font-family="serif" font-size="22" fill="#FAF8F4" opacity="0.7" text-anchor="middle">真鍋金具</text>
  <text x="300" y="260" font-family="serif" font-size="12" fill="#FAF8F4" opacity="0.4" text-anchor="middle">日本製 ・ 手磨き仕上げ</text>
</svg>