<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450">
  <rect width="600" height="450" fill="#8B6347"/>
  <!-- leather texture -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="600" height="450" fill="#7F5539" filter="url(#noise)" opacity="0.5"/>
  <line x1="0" y1="90" x2="600" y2="90" stroke="#6b4030" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="180" x2="600" y2="180" stroke="#6b4030" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="270" x2="600" y2="270" stroke="#6b4030" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="360" x2="600" y2="360" stroke="#6b4030" stroke-width="0.5" opacity="0.3"/>
  <text x="300" y="235" font-family="serif" font-size="22" fill="#FAF8F4" opacity="0.6" text-anchor="middle">栃木レザー</text>
  <text x="300" y="265" font-family="serif" font-size="12" fill="#FAF8F4" opacity="0.4" text-anchor="middle">栃木県 ・ 植物タンニン骿し</text>
</svg>