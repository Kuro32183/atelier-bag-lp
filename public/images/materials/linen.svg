<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450">
  <rect width="600" height="450" fill="#e8e0d0"/>
  <!-- linen weave pattern -->
  <defs>
    <pattern id="linen" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#e8e0d0"/>
      <rect x="0" y="0" width="4" height="1" fill="#c8b89a" opacity="0.6"/>
      <rect x="0" y="4" width="4" height="1" fill="#c8b89a" opacity="0.6"/>
      <rect x="4" y="2" width="4" height="1" fill="#c8b89a" opacity="0.6"/>
      <rect x="4" y="6" width="4" height="1" fill="#c8b89a" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="600" height="450" fill="url(#linen)"/>
  <text x="300" y="235" font-family="serif" font-size="22" fill="#7F5539" opacity="0.7" text-anchor="middle">国産リネン</text>
  <text x="300" y="260" font-family="serif" font-size="12" fill="#7F5539" opacity="0.5" text-anchor="middle">岡山県 ・ 高密度織り</text>
</svg>