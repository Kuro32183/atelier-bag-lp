  <path d="M420 200 Q420 140 470 140 Q520 140 520 200" fill="none" stroke="#6b4c35" stroke-width="14" stroke-linecap="round"/>
  <!-- leather texture lines -->
  <line x1="220" y1="280" x2="580" y2="280" stroke="#6b4c35" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="340" x2="580" y2="340" stroke="#6b4c35" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="400" x2="580" y2="400" stroke="#6b4c35" stroke-width="0.5" opacity="0.4"/>
