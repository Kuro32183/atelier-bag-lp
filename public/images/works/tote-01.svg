  <rect x="370" y="340" width="60" height="30" rx="3" fill="#FAF8F4" opacity="0.8"/>
  <text x="400" y="360" font-family="serif" font-size="9" fill="#102A43" text-anchor="middle">ATELIER</text>
  <text x="400" y="555" font-family="serif" font-size="18" fill="#102A43" opacity="0.5" text-anchor="middle">栃木レザー トートバッグ</text>
